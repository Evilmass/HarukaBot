services:
  qqbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qqbot
    image: haruka-bot:local
    init: true
    ipc: host
    restart: unless-stopped
    env_file:
      - path: ./.env.prod
        required: false
    environment:
      HOST: "0.0.0.0"
      PORT: "7070"
      HARUKA_DIR: "/app/data/"
      TZ: "Asia/Shanghai"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "${HARUKA_HOST_PORT:-7070}:7070"
    logging:
      options:
        max-size: 10m
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import socket; socket.create_connection(('127.0.0.1', 7070), 2).close()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
